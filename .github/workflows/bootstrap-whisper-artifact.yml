name: Bootstrap Whisper model artifact

on:
  push:
    branches:
      - agent/bootstrap-whisper-artifact
    paths:
      - .github/workflows/bootstrap-whisper-artifact.yml

permissions:
  contents: read

env:
  MODEL_REPO: Systran/faster-whisper-base

jobs:
  package-model:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Install Hugging Face client
        run: python -m pip install --disable-pip-version-check --quiet 'huggingface_hub>=0.30,<1'

      - name: Download CTranslate2 Whisper model
        run: |
          python - <<'PY'
          from huggingface_hub import snapshot_download
          snapshot_download(
              repo_id='Systran/faster-whisper-base',
              local_dir='faster-whisper-base',
              allow_patterns=['config.json', 'model.bin', 'tokenizer.json', 'vocabulary.txt'],
          )
          PY
          test -s faster-whisper-base/model.bin

      - name: Package model
        run: tar -czf faster-whisper-base.tar.gz faster-whisper-base

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: faster-whisper-base
          path: faster-whisper-base.tar.gz
          retention-days: 1
          compression-level: 0
